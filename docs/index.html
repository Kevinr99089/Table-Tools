  <style>
    :root{--bg:#fcfbf8;--ink:#1a1a2e;--muted:#666;--red:#c0392b;--wood:#8d6e63;--ok:#2e7d32;--font:"Comic Sans MS","Chalkboard SE","Marker Felt",system-ui,sans-serif;}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
    body{margin:0;color:var(--ink);font-family:var(--font);background:var(--bg);
      background-image:linear-gradient(#e0e0e0 1px,transparent 1px),linear-gradient(90deg,#e0e0e0 1px,transparent 1px);
      background-size:20px 20px;background-blend-mode:multiply;padding-bottom:90px;}
    .drawn{filter:url('#wiggle')}
    header{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:2px solid var(--ink);padding:10px;display:flex;align-items:center;gap:10px;box-shadow:0 4px 10px rgba(0,0,0,.1)}
    header button{background:transparent;border:2px solid var(--ink);border-radius:50%;width:40px;height:40px;font-size:18px;cursor:pointer;display:grid;place-items:center}
    #wakeIcon,#fsIcon{opacity:.15;font-size:10px;line-height:1.1;text-align:right;transition:.2s}
    #wakeIcon.on{opacity:1;color:var(--ok);font-weight:900}
    #fsIcon.on{opacity:1;color:var(--wood);font-weight:900}
    main{max-width:860px;margin:0 auto;padding:15px}
    h2{margin:10px 0 8px}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:15px}
    @media(min-width:600px){.grid{grid-template-columns:repeat(3,minmax(0,1fr));}}
    .card{background:#fff;border:2px solid var(--ink);border-radius:6px;padding:15px;display:flex;flex-direction:column;align-items:center;gap:6px;box-shadow:3px 3px 0 rgba(0,0,0,.1);cursor:pointer}
    .card:active{transform:scale(.98)}
    .card .ico{font-size:32px}
    .card .tit{font-weight:900;font-size:16px}
    .card .sub{font-size:11px;color:var(--muted);font-style:italic;text-align:center}
    .panel{background:#fff;border:2px solid var(--ink);border-radius:10px;padding:14px;box-shadow:2px 2px 0 rgba(0,0,0,.12)}
    .kicker{font-size:12px;color:var(--muted);font-style:italic;text-align:center}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    .btn{flex:1;min-width:140px;padding:12px;background:#fff;border:2px solid var(--ink);border-radius:10px;font-family:var(--font);font-weight:900;cursor:pointer;box-shadow:2px 2px 0 var(--ink)}
    .btn:active{transform:translate(2px,2px);box-shadow:none}
    .btn.sec{border-style:dashed;opacity:.9;box-shadow:none}
    .btn.red{color:var(--red);border-color:var(--red)}
    input{background:transparent;border:none;border-bottom:1px dashed #999;font-family:var(--font);font-size:16px;width:100%;text-align:center;color:var(--ink);user-select:text;border-radius:0}
    input:focus{outline:none;border-bottom:2px solid var(--ink);background:#f0f0f0}
    .paper-table{width:100%;border-collapse:collapse;background:#fff;margin:12px 0}
    .paper-table th{border:2px solid var(--ink);background:#eee;padding:6px;font-size:12px;text-transform:uppercase}
    .paper-table td{border:2px solid var(--ink);padding:6px;text-align:center;height:36px}
    .paper-table td.label{text-align:left;font-weight:900;background:#fafafa;width:140px;font-size:13px}
    .belote-split{display:flex;border:3px solid var(--ink);height:300px;background:#fff;filter:url('#wiggle')}
    .belote-col{flex:1;display:flex;flex-direction:column;border-right:2px solid var(--ink)}
    .belote-col:last-child{border:none}
    .b-head{background:#eee;padding:10px;text-align:center;font-weight:900;border-bottom:2px solid var(--ink)}
    .b-tot{font-size:40px;text-align:center;padding:10px;font-weight:1000;border-bottom:2px dashed #ccc}
    .b-list{flex:1;overflow-y:auto;font-size:14px;text-align:center;line-height:1.8}
    .d3{display:flex;gap:12px;justify-content:center;align-items:center;margin:14px 0 6px}
    .d3-check{display:flex;gap:12px;justify-content:center;align-items:center;margin:4px 0}
    .die{width:74px;height:74px;border:3px solid var(--ink);border-radius:14px;display:grid;place-items:center;font-size:34px;font-weight:1000;background:#fff;box-shadow:3px 3px 0 rgba(0,0,0,.12)}
    .molkky-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:14px 0}
    .pin-btn{aspect-ratio:1;border:2px solid var(--wood);border-radius:50%;background:#fff;color:var(--wood);font-weight:1000;font-size:20px;display:grid;place-items:center;cursor:pointer}
    .pin-btn:active{background:var(--wood);color:#fff}
    .m-player{padding:10px;border:2px solid var(--ink);margin-bottom:10px;border-radius:10px;background:#fff}
    #alarmFlash{position:fixed;inset:0;z-index:500;pointer-events:none;opacity:0;background:#ffcf3f}
    #alarmFlash.flashing{animation:alarmFlashKf .5s ease-in-out infinite}
    @keyframes alarmFlashKf{0%,100%{opacity:0}50%{opacity:.55}}
    .m-player.active{border:4px solid var(--wood);background:#fff8e1}
    .bac-big{width:130px;height:130px;border:3px solid var(--ink);border-radius:16px;display:grid;place-items:center;font-size:64px;font-weight:1000;background:#fff;box-shadow:4px 4px 0 rgba(0,0,0,.15);margin:14px auto}
    .bac-grid{display:grid;grid-template-columns:repeat(26,1fr);gap:2px;margin:14px 0}
    .bac-letter{aspect-ratio:auto;height:24px;border:1px solid var(--ink);border-radius:4px;display:grid;place-items:center;font-weight:1000;font-size:10px;background:#fff;padding:0}
    .bac-letter.used{opacity:.35;text-decoration:line-through}
    .bac-letter.excluded{opacity:.2;border-style:dashed}
    .bac-letter.current{background:var(--red);color:#fff;border-color:var(--red)}
    .banner{position:sticky;top:64px;z-index:49;background:#fff;border:2px dashed var(--ink);padding:10px;border-radius:12px;box-shadow:2px 2px 0 rgba(0,0,0,.12);margin:10px 0;display:none}
    .banner.show{display:block}
    .banner b{color:var(--red)}
    #hgWrap{display:flex;justify-content:center;margin:12px 0}
    #hgCanvas{border:3px solid var(--ink);border-radius:4px;background:#fff;box-shadow:3px 3px 0 rgba(0,0,0,.12);image-rendering:pixelated}
    @keyframes hgFlip{ from{transform:rotate(0deg)} to{transform:rotate(180deg)} }
    .hg-flip{animation:hgFlip .45s ease-in-out}
    .t-unit{display:flex;flex-direction:column;align-items:center;gap:6px}
    .t-val{font-weight:1000;font-size:20px;min-width:40px}
    .qbtn{width:30px;height:30px;flex-shrink:0;border-radius:50%;border:2.5px solid var(--ink);background:#fff;color:var(--ink);
      font-family:var(--font);font-weight:1000;font-size:15px;line-height:1;cursor:pointer;box-shadow:2px 2px 0 var(--ink);padding:0}
    .qbtn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 var(--ink)}
    .modal-overlay{position:fixed;inset:0;z-index:6000;background:rgba(26,26,46,.55);display:none;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto}
    .modal-overlay.show{display:flex}
    .modal-box{background:var(--bg);border:3px solid var(--ink);border-radius:14px;max-width:480px;width:100%;margin-top:40px;padding:18px;box-shadow:5px 5px 0 var(--ink);font-size:14px}
    video{position:absolute;top:0;left:0;width:1px;height:1px;opacity:.01;pointer-events:none}
  </style>
</head>

      <div style="font-weight:1000;font-size:18px">TableTool</div>

  function showBanner(force){

  async function tryVideoKeepAlive(){
    try{ if (vid && vid.paused) await vid.play(); }catch(e){}
  }
  async function tryWakeLock(){
    if(!wantWake){ await releaseWakeLock(); return; }
    await tryVideoKeepAlive();
    if(!("wakeLock" in navigator) || !window.isSecureContext){
      setWakeUI(false);
      return;
    }
    try{
      if(!wakeLock){
        wakeLock = await navigator.wakeLock.request("screen");
        wakeLock.addEventListener("release", ()=>{ wakeLock=null; setWakeUI(false); });
      }
      setWakeUI(true);
    }catch(e){
      wakeLock = null;
      setWakeUI(false);
    }
  }
  async function releaseWakeLock(){
    try{ if(wakeLock) await wakeLock.release(); }catch(e){}
    wakeLock=null;
    setWakeUI(false);
  }
  async function tryFullscreen(){
    if(!wantFS){ setFSUI(false); return; }

    }catch(e){}

  function scheduleKeepAlive(){
    clearInterval(keepAliveTimer);

      if(document.visibilityState !== "visible") return;
      if(wantWake){
        if(!wakeLock && ("wakeLock" in navigator)) await tryWakeLock();
        await tryVideoKeepAlive();
      }
      if(wantFS && !document.fullscreenElement) showBanner(true);
    }, 5000);
  }
  function safeReplaceState(state, hash){
    try{ history.replaceState(state, "", hash); }
    catch(e){ if(location.hash !== hash) location.hash = hash; }
  }
  function safePushState(state, hash){
    try{ history.pushState(state, "", hash); }
    catch(e){ if(location.hash !== hash) location.hash = hash; }
  }

  const Aud = window.AudioContext || window.webkitAudioContext;
  let sharedAudioCtx = null;
  function unlockAudioCtx(){
    if(!Aud) return null;
    if(!sharedAudioCtx) sharedAudioCtx = new Aud();
    if(sharedAudioCtx.state === "suspended") sharedAudioCtx.resume().catch(()=>{});
    return sharedAudioCtx;
  }
  function ding(){
    const c=unlockAudioCtx(); if(!c) return;
    const t=c.currentTime;
    const o=c.createOscillator(); const g=c.createGain();
    o.connect(g); g.connect(c.destination);
    o.frequency.setValueAtTime(1200,t);
    g.gain.linearRampToValueAtTime(0.5,t+0.01);
    g.gain.exponentialRampToValueAtTime(0.01,t+1.2);
    o.start(t); o.stop(t+1.2);
  }
  let noiseBufPool=null;
  function getNoiseBuf(c){
    if(!noiseBufPool){
      noiseBufPool=[];
      for(let k=0;k<6;k++){
        const dur=0.018+Math.random()*0.02;
        const size=Math.max(1,Math.floor(c.sampleRate*dur));
        const buf=c.createBuffer(1,size,c.sampleRate);
        const data=buf.getChannelData(0);
        for(let j=0;j<size;j++) data[j]=(Math.random()*2-1)*Math.pow(1-j/size,1.6);
        noiseBufPool.push(buf);
      }
    }
    return noiseBufPool[Math.floor(Math.random()*noiseBufPool.length)];
  }
  function diceClack(){
    const c=unlockAudioCtx(); if(!c) return;
    const n=9+Math.floor(Math.random()*4);
    let t=c.currentTime+0.005;
    for(let i=0;i<n;i++){
      const buf=getNoiseBuf(c);
      const noise=c.createBufferSource(); noise.buffer=buf;
      const bp=c.createBiquadFilter();
      bp.type="bandpass";
      bp.frequency.value = i<2 ? (1000+Math.random()*300) : (2300+Math.random()*650);
      bp.Q.value=0.9+Math.random()*0.7;
      const g=c.createGain();
      const trend=1-0.5*(i/(n-1));
      const jitter=0.4+Math.random()*0.6;
      g.gain.setValueAtTime(0.55*trend*jitter,t);
      noise.connect(bp); bp.connect(g); g.connect(c.destination);
      noise.start(t); noise.stop(t+buf.duration);
      t += 0.014+Math.random()*0.045;
    }
  }
  function ringAlarm(){
    const c=unlockAudioCtx();
    if(navigator.vibrate) navigator.vibrate([700,300,700,300,700]);
    const pulseDur=0.045, pulseGap=0.01, ringPulses=14, ringGap=0.32, rings=3;
    const ringDur = ringPulses*(pulseDur+pulseGap);
    const totalMs = Math.round((rings*ringDur+(rings-1)*ringGap)*1000);
    if(alarmFlashEl){
      alarmFlashEl.classList.add("flashing");
      setTimeout(()=> alarmFlashEl.classList.remove("flashing"), totalMs+300);
    }
    if(!c) return;
    let t=c.currentTime+0.03;
    for(let r=0; r<rings; r++){
      for(let i=0;i<ringPulses;i++){
        const o=c.createOscillator(); const g=c.createGain();
        o.type="triangle";
        o.connect(g); g.connect(c.destination);
        o.frequency.setValueAtTime(i%2===0 ? 1000 : 1122, t);
        g.gain.setValueAtTime(0.0001, t);
        g.gain.linearRampToValueAtTime(0.5, t+0.008);
        g.gain.setValueAtTime(0.5, t+pulseDur-0.012);
        g.gain.exponentialRampToValueAtTime(0.0001, t+pulseDur);
        o.start(t); o.stop(t+pulseDur+0.01);
        t += pulseDur+pulseGap;
      }
      t += ringGap;
    }
  }

  let tInt=null, hgInt=null, hgPhase=0;
  let tS={t:60,r:60,run:false};
  function stopTimer(){
    if(tInt){ clearInterval(tInt); tInt=null; }
    if(hgInt){ clearInterval(hgInt); hgInt=null; }
    tS.run=false;
  }
  function formatTime(total){
    total = Math.max(0, total);
    const h=Math.floor(total/3600), m=Math.floor((total%3600)/60), s=total%60;
    const mm=String(m).padStart(2,"0"), ss=String(s).padStart(2,"0");
    return h>0 ? (h+":"+mm+":"+ss) : (mm+":"+ss);
  }
  function adjustTime(unit, dir){
    let h=Math.floor(tS.t/3600), rem=tS.t%3600, m=Math.floor(rem/60), s=rem%60;
    if(unit==="h") h=Math.max(0,Math.min(23,h+dir));
    if(unit==="m") m=Math.max(0,Math.min(59,m+dir));
    if(unit==="s") s=Math.max(0,Math.min(59,s+dir));
    stopTimer();
    tS.t = h*3600+m*60+s;
    tS.r = tS.t;
    render();
  }
  const HG_COLS=18, HG_ROWS=30, HG_CELL=7;
  const HG_WIDE=[2,15], HG_NARROW=[8,9];
  function hgRowBounds(i, n, reverse){
    const f = n<=1 ? 0 : i/(n-1);
    const a = reverse ? HG_NARROW : HG_WIDE;
    const b = reverse ? HG_WIDE : HG_NARROW;
    return { left: Math.round(a[0] + (b[0]-a[0])*f), right: Math.round(a[1] + (b[1]-a[1])*f) };
  }
  function drawHourglass(){
    const cv = $("#hgCanvas");
    if(!cv) return;
    const ctx = cv.getContext("2d");
    ctx.clearRect(0,0,cv.width,cv.height);
    const px = (col,row,color)=>{ ctx.fillStyle=color; ctx.fillRect(col*HG_CELL,row*HG_CELL,HG_CELL,HG_CELL); };
    const INK="#1a1a2e", WOOD="#8d6e63", SAND="#eba83a", GLASS="#f2f0ea";
    const frac = tS.t>0 ? Math.max(0,Math.min(1, tS.r/tS.t)) : 0;
    const atRest = !tS.run && tS.r>=tS.t;
    for(let c=0;c<HG_COLS;c++){ px(c,0,WOOD); px(c,1,WOOD); px(c,HG_ROWS-2,WOOD); px(c,HG_ROWS-1,WOOD); }
    const topN=12, botN=12, topStart=2, neckStart=14, botStart=16;
    const fillTop = atRest ? 0 : Math.round(topN * frac);
    const fillBot = atRest ? botN : Math.round(botN * (1-frac));
    for(let i=0;i<topN;i++){
      const row = topStart+i;
      const {left,right} = hgRowBounds(i, topN, false);
      px(left,row,INK); px(right,row,INK);
      const isSand = i >= (topN - fillTop);
      for(let c=left+1;c<right;c++) px(c,row, isSand ? SAND : GLASS);
    }
    for(let row=neckStart; row<neckStart+2; row++){
      px(HG_NARROW[0],row,INK); px(HG_NARROW[1],row,INK);
      for(let c=HG_NARROW[0]+1;c<HG_NARROW[1];c++) px(c,row,GLASS);
    }
    if(tS.run && frac>0 && frac<1){
      const gRow = neckStart + (hgPhase%2);
      px(HG_NARROW[0]+1, gRow, SAND);
    }
    for(let i=0;i<botN;i++){
      const row = botStart+i;
      const {left,right} = hgRowBounds(i, botN, true);
      px(left,row,INK); px(right,row,INK);
      const isSand = i >= (botN - fillBot);
      for(let c=left+1;c<right;c++) px(c,row, isSand ? SAND : GLASS);
    }
  }
  function beginRun(){
    tS.run=true;
    tInt=setInterval(()=>{
      tS.r--;
      if(tS.r<=0){ tS.r=0; stopTimer(); drawHourglass(); ringAlarm(); updateTimerText(); return; }
      updateTimerText();
    }, 1000);
    hgInt=setInterval(()=>{ hgPhase++; drawHourglass(); }, 180);
    updateTimerText();
  }
  function updateTimerText(){
    const el=$("#tTime"); if(el) el.textContent = formatTime(tS.r);
    const btn=$("#tStart"); if(btn) btn.textContent = tS.run ? t('timer_pause') : t('timer_start');
  }
  function rTimer(){
    const H=Math.floor(tS.t/3600), Mrem=tS.t%3600, M=Math.floor(Mrem/60), S=Mrem%60;
    app.innerHTML = '<div class="panel drawn" style="text-align:center">'
      + '<div style="font-weight:1000;font-size:18px">'+t('t_timer_t')+'</div>'
      + '<div id="hgWrap"><canvas id="hgCanvas" width="'+(HG_COLS*HG_CELL)+'" height="'+(HG_ROWS*HG_CELL)+'"></canvas></div>'
      + '<div id="tTime" style="font-weight:1000;font-size:40px">'+formatTime(tS.r)+'</div>'
      + '<div class="actions"><button class="btn" id="tStart">'+(tS.run?t('timer_pause'):t('timer_start'))+'</button><button class="btn sec" id="tReset">'+t('timer_reset_btn')+'</button></div>'
      + '<div class="actions">'+[30,60,90,120,180,300].map(s=>'<button class="btn sec" data-p="'+s+'">'+(s<60? s+'s' : (s/60)+'m')+'</button>').join("")+'</div>'
      + '</div>'
      + '<div class="panel drawn" style="margin-top:14px">'
      + '<div class="kicker" style="text-align:center">'+t('timer_manual_kicker')+'</div>'
      + '<div style="display:flex;justify-content:center;gap:22px;margin-top:6px">'
      +   ['h','m','s'].map(u=>{
            const label = u==="h"?t('timer_h'):(u==="m"?t('timer_min'):t('timer_sec'));
            const val = u==="h"?H:(u==="m"?M:S);
            return '<div class="t-unit">'
              + '<button class="qbtn" data-unit="'+u+'" data-dir="1">+</button>'
              + '<div class="t-val">'+String(val).padStart(2,"0")+'</div>'
              + '<div style="font-size:10px;color:var(--muted);font-weight:900">'+label+'</div>'
              + '<button class="qbtn" data-unit="'+u+'" data-dir="-1">−</button>'
              + '</div>';
          }).join("")
      + '</div>'
      + '</div>';
    drawHourglass();
    $("#tStart").addEventListener("click", ()=>{
      if(tS.run){ stopTimer(); updateTimerText(); return; }
      if(tS.t<=0) return;
      const fresh = tS.r>=tS.t || tS.r<=0;
      if(fresh){
        const cv=$("#hgCanvas");
        let done=false;
        const finish=()=>{
          if(done) return; done=true;
          cv.classList.remove("hg-flip");
          tS.r=tS.t;
          beginRun();
          drawHourglass();
        };
        cv.classList.add("hg-flip");
        cv.addEventListener("animationend", finish, {once:true});
        setTimeout(finish, 500);
      }else{
        beginRun();
      }
    });
    $("#tReset").addEventListener("click", ()=>{ stopTimer(); tS.r=tS.t; render(); });
    app.querySelectorAll("[data-p]").forEach(b=> b.addEventListener("click", ()=>{ const s=Number(b.getAttribute("data-p")); stopTimer(); tS.t=s; tS.r=s; render(); }) );
    app.querySelectorAll("[data-unit]").forEach(b=> b.addEventListener("click", ()=>{ adjustTime(b.getAttribute("data-unit"), Number(b.getAttribute("data-dir"))); }) );
  }
  const BAC_ALL = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
  const BAC_HARD = ["Q","W","X","Y","Z"];
  const BAC_MAX_DURATION = 600;
  function bacPool(d){ return BAC_ALL.filter(l=> !(d.excludeHard && BAC_HARD.includes(l))); }
  let bacInt=null;
  let bacTS={t:60,r:60,run:false};
  let bacPreInt=null, bacPreVal=0;
  function stopBacTimer(){ if(bacInt){ clearInterval(bacInt); bacInt=null; } bacTS.run=false; }
  function stopBacPre(){ if(bacPreInt){ clearInterval(bacPreInt); bacPreInt=null; } bacPreVal=0; }
  function updateBacTimerText(){
    const el=$("#bacTime"); if(el) el.textContent = formatTime(bacTS.r);
    const btn=$("#bacStart"); if(btn) btn.textContent = bacTS.run ? t('timer_pause') : t('timer_start');
  }
  function beginBacRun(){
    bacTS.run=true;
    bacInt=setInterval(()=>{
      bacTS.r--;
      if(bacTS.r<=0){ bacTS.r=0; stopBacTimer(); ringAlarm(); updateBacTimerText(); return; }
      updateBacTimerText();
    }, 1000);
    updateBacTimerText();
  }
  function adjustBacDuration(d, unit, dir){
    let m = Math.floor(d.duration/60), s = d.duration%60;
    if(unit==="m") m = Math.max(0, Math.min(10, m+dir));
    if(unit==="s") s = Math.max(0, Math.min(59, s+dir));
    if(m>=10){ m=10; s=0; }
    d.duration = m*60+s;
    save("bac", d);
    stopBacTimer(); stopBacPre();
    bacTS.t=d.duration; bacTS.r=d.duration;
    render();
  }
  function startBacCountdown(d){
    if(d.duration<=0) return;
    stopBacTimer(); stopBacPre();
    bacTS.t=d.duration; bacTS.r=d.duration;
    bacPreVal=3;
    render();
    bacPreInt=setInterval(()=>{
      bacPreVal--;
      if(bacPreVal<=0){
        clearInterval(bacPreInt); bacPreInt=null; bacPreVal=0;
        beginBacRun();
        render();
      }else{
        render();
      }
    }, 1000);
  }
  function rBac(){
    const d = load("bac", {excludeHard:true, duration:60, used:[], current:null});
    if(!Array.isArray(d.used)) d.used=[];
    if(typeof d.duration!=="number" || d.duration<0 || d.duration>BAC_MAX_DURATION) d.duration=60;
    if(!bacTS.run && !bacPreVal && bacTS.t!==d.duration){ bacTS.t=d.duration; bacTS.r=d.duration; }
    const pool = bacPool(d);
    const grid = BAC_ALL.map(l=>{
      const excluded = d.excludeHard && BAC_HARD.includes(l);
      const used = !excluded && d.used.includes(l);
      const current = d.current===l;
      let cls = "bac-letter" + (current?" current":(excluded?" excluded":(used?" used":"")));
      return '<div class="'+cls+'">'+l+'</div>';
    }).join("");
    const durM = Math.floor(d.duration/60), durS = d.duration%60;
    const timerZone = bacPreVal>0
      ? `
        <div style="font-weight:1000;font-size:18px">${t('bac_announce')}</div>
        <div style="font-weight:1000;font-size:56px;margin:10px 0;color:var(--red)">${bacPreVal}</div>
        <div class="kicker">${t('bac_starts_after')}</div>
      `
      : `
        <div style="font-weight:1000;font-size:18px">${t('bac_round_timer')}</div>
        <div id="bacTime" style="font-weight:1000;font-size:40px;margin:10px 0">${formatTime(bacTS.r)}</div>
        <div class="actions" style="justify-content:center">
          <button class="btn" id="bacStart">${bacTS.run?t('timer_pause'):t('timer_start')}</button>
          <button class="btn sec" id="bacReset">${t('timer_reset_btn')}</button>
        </div>
        <div class="kicker" style="margin-top:10px">${t('bac_set_time_kicker')}</div>
        <div style="display:flex;justify-content:center;gap:22px;margin-top:6px">
          <div class="t-unit">
            <button class="qbtn" data-bacunit="m" data-bacdir="1">+</button>
            <div class="t-val">${String(durM).padStart(2,"0")}</div>
            <div style="font-size:10px;color:var(--muted);font-weight:900">${t('timer_min')}</div>
            <button class="qbtn" data-bacunit="m" data-bacdir="-1">−</button>
          </div>
          <div class="t-unit">
            <button class="qbtn" data-bacunit="s" data-bacdir="1">+</button>
            <div class="t-val">${String(durS).padStart(2,"0")}</div>
            <div style="font-size:10px;color:var(--muted);font-weight:900">${t('timer_sec')}</div>
            <button class="qbtn" data-bacunit="s" data-bacdir="-1">−</button>
          </div>
        </div>
      `;
    app.innerHTML = `
      <div class="panel drawn" style="text-align:center">
        <div style="display:flex;gap:8px;align-items:center;justify-content:center">
          <div style="font-weight:1000;font-size:18px">${t('g_bac_t')}</div>
          ${qbtn("bac")}
        </div>
        <div class="kicker">${t('bac_kicker')}</div>
        <div class="bac-big drawn" id="bacLetter">${d.current || "?"}</div>
        <div class="actions" style="justify-content:center">
          <button class="btn" id="bacDraw">${t('bac_draw_btn')}</button>
        </div>
        <div style="text-align:center;margin-top:12px">
          <label style="display:inline-flex;align-items:center;gap:6px;font-size:11px">
            <input type="checkbox" id="bacHard" ${d.excludeHard?"checked":""}>
            <span>${t('bac_hard_label')}</span>
          </label>
        </div>
        <div class="bac-grid">${grid}</div>
        <div class="actions">
          <button class="btn sec" id="bacUsedReset">${t('bac_clear_btn')}</button>
        </div>
      </div>
      <div class="panel drawn" style="margin-top:14px;text-align:center">
        ${timerZone}
      </div>
    `;
    $("#bacDraw").addEventListener("click", ()=>{
      const p = bacPool(d);
      if(p.length===0) return;
      let avail = p.filter(l=> !d.used.includes(l));
      if(avail.length===0) avail = p.slice();
      const finalLetter = avail[Math.floor(Math.random()*avail.length)];
      diceClack();
      const el = $("#bacLetter");
      let i=0, last=null;
      function frame(now){
        if(last===null) last=now;
        if(now-last>=50){
          el.textContent = p[Math.floor(Math.random()*p.length)];
          last=now; i++;
        }
        if(i<11) requestAnimationFrame(frame);
        else{
          if(p.every(l=> d.used.includes(l))) d.used=[];
          if(!d.used.includes(finalLetter)) d.used.push(finalLetter);
          d.current = finalLetter;
          save("bac", d);
          startBacCountdown(d);
        }
      }
      requestAnimationFrame(frame);
    });
    $("#bacHard").addEventListener("change", (e)=>{ d.excludeHard = e.target.checked; save("bac", d); render(); });
    $("#bacUsedReset").addEventListener("click", ()=>{ d.used=[]; save("bac", d); render(); });
    if(bacPreVal<=0){
      $("#bacStart").addEventListener("click", ()=>{
        if(bacTS.run){ stopBacTimer(); updateBacTimerText(); return; }
        if(bacTS.t<=0) return;
        if(bacTS.r>=bacTS.t || bacTS.r<=0) bacTS.r = bacTS.t;
        beginBacRun();
      });
      $("#bacReset").addEventListener("click", ()=>{ stopBacTimer(); stopBacPre(); bacTS.r=bacTS.t; updateBacTimerText(); });
      app.querySelectorAll("[data-bacunit]").forEach(b=> b.addEventListener("click", ()=>{
        adjustBacDuration(d, b.getAttribute("data-bacunit"), Number(b.getAttribute("data-bacdir")));
      }));
    }
  }
  function rCustom(){
    const cfg = load("custom_cfg",{title:t('custom_default_title'), players:4, rounds:5});
    app.innerHTML = `
      <div class="panel drawn">
        <div style="font-weight:1000;font-size:18px">${t('g_custom_t')}</div>
        <div class="kicker">${t('custom_kicker')}</div>
        <div class="actions" style="margin-top:10px">
          <div style="flex:1;min-width:160px"><div style="font-size:12px;color:var(--muted);margin-bottom:6px">${t('custom_title_label')}</div><input id="ctTitle" value="${esc(cfg.title)}"></div>
          <div style="flex:1;min-width:120px"><div style="font-size:12px;color:var(--muted);margin-bottom:6px">${t('custom_players_label')}</div><input id="ctPlayers" type="number" min="1" max="12" value="${cfg.players}"></div>
          <div style="flex:1;min-width:120px"><div style="font-size:12px;color:var(--muted);margin-bottom:6px">${t('custom_rounds_label')}</div><input id="ctRounds" type="number" min="1" max="30" value="${cfg.rounds}"></div>
        </div>
        <div class="actions">
          <button class="btn" id="ctGo">${t('custom_generate_btn')}</button>
          <button class="btn sec red" id="ctReset">${t('custom_reset_sheet_btn')}</button>
        </div>
      </div>
    `;
    function saveCfg(){
      cfg.title=$("#ctTitle").value||t('custom_default_title');
      cfg.players=Math.max(1,Math.min(12,Number($("#ctPlayers").value)||4));
      cfg.rounds=Math.max(1,Math.min(30,Number($("#ctRounds").value)||5));
      save("custom_cfg",cfg);
    }
    $("#ctTitle").addEventListener("input", saveCfg);
    $("#ctPlayers").addEventListener("input", saveCfg);
    $("#ctRounds").addEventListener("input", saveCfg);
    $("#ctGo").addEventListener("click", ()=>{
      saveCfg();
      const ps=Array.from({length:cfg.players},(_,i)=>"J"+(i+1));
      const r=Array.from({length:cfg.rounds},()=>({k:"", s:new Array(cfg.players).fill(0)}));
      save("custom_sheet",{ps:ps, r:r, meta:{date:"", title:cfg.title}});
      nav("#custom_sheet");
    });
    $("#ctReset").addEventListener("click", ()=>{ if(confirm(t('confirm_reset'))){ save("custom_sheet",{ps:["J1","J2"], r:[], meta:{date:"", title:t('custom_default_title')}}); alert(t('generic_ok')); }});
  }
  function rCustomSheet(){
    const d = load("custom_sheet",{ps:["J1","J2"], r:[], meta:{date:"", title:t('custom_default_title')}});
    renderSheet("custom_sheet", (d.meta && d.meta.title) ? d.meta.title : t('custom_default_title'), {defaultPlayers:d.ps, addRoundLabel:t('sheet_add_round')});
  }
  function render(){
    const h = location.hash || "#home";
    if(h==="#home"){ backBtn.style.visibility="hidden"; homeBtn.disabled=true; }
    else{ backBtn.style.visibility="visible"; homeBtn.disabled=false; }
    if(h!=="#timer") stopTimer();
    if(h!=="#bac"){ stopBacTimer(); stopBacPre(); }
    showBanner(false);
    switch(h){
      case "#home": rHome(); break;
      case "#belote": rBelote(); break;
      case "#yams": rYams(); break;
      case "#tarot": rTarot(); break;
      case "#rami": rRami(); break;
      case "#uno": rUno(); break;
      case "#scrabble": rScrabble(); break;
      case "#free": rFree(); break;
      case "#421": r421(); break;
      case "#skyjo": rSkyjo(); break;
      case "#petanque": rPetanque(); break;
      case "#bac": rBac(); break;
      case "#victoires": rVictoires(); break;
      case "#molkky": rMolkky(); break;
      case "#dice": rDice(); break;
      case "#timer": rTimer(); break;
      case "#custom": rCustom(); break;
      case "#custom_sheet": rCustomSheet(); break;
      default: rHome();
    }
  }
  applyStaticI18N();
  setWakeUI(false); setFSUI(false);
  boot();
  if("serviceWorker" in navigator){
    window.addEventListener("load", ()=>{
      navigator.serviceWorker.register("sw.js").catch(()=>{});
    });
  }
})();
</script>
</body>
</html>
